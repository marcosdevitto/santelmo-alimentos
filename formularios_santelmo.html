// ── HELPERS CURVAS PESO ───────────────────────────────────────────────────────
function getIdealPeso(gen, sem, tipo){
  const cp = CURVAS_PESO[gen]; if(!cp) return null;
  const isRecria = sem <= 18;
  if(tipo === 'ave'){
    if(isRecria){
      const ks = Object.keys(cp.ave_recria).map(Number).filter(k=>k<=sem);
      if(!ks.length) return null;
      return cp.ave_recria[Math.max(...ks)]; // {min, max?}
    } else {
      const ks = Object.keys(cp.ave_prod).map(Number).filter(k=>k<=sem);
      if(!ks.length) return null;
      return {min: cp.ave_prod[Math.max(...ks)]};
    }
  } else { // ovo
    const ks = Object.keys(cp.ovo).map(Number).filter(k=>k<=sem);
    if(!ks.length) return null;
    return {min: cp.ovo[Math.max(...ks)]};
  }
}

function classifyDev(val, ideal, isRecria){
  if(!ideal || isNaN(val)) return {cls:'dev-neutro', label:'—'};
  if(isRecria && ideal.max !== undefined){
    if(val < ideal.min) return {cls:'dev-baixo', label:`${(val-ideal.min).toFixed(0)}g (abaixo do mín.)`};
    if(val > ideal.max) return {cls:'dev-alto',  label:`+${(val-ideal.max).toFixed(0)}g (acima do máx.)`};
    return {cls:'dev-ok', label:'dentro da faixa'};
  } else {
    const diff = val - ideal.min;
    if(diff < 0) return {cls:'dev-baixo', label:`${diff.toFixed(1)}g (abaixo do mín.)`};
    return {cls:'dev-ok', label:`+${diff.toFixed(1)}g`};
  }
}

async function verificar(colecao, docId){
  try{ const d=await db.collection(colecao).doc(docId).get(); return d.exists?d.data():null; }
  catch(e){ return null; }
}

// ── INICIALIZAÇÃO ─────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('hdate').textContent = `Lançamento — ${HOJE_BR}`;
  try{
    // Carrega lotes ativos
    const lotesSnap = await db.collection('lotes').get();
    S.lotes = lotesSnap.docs.map(d=>({id:d.id,...d.data()}));
    S.lotes.sort((a,b)=>a.nome.localeCompare(b.nome));

    // Carrega curvas
    // Carrega curvas do Firebase — se não existirem, usa as embutidas
    const curvasSnap = await db.collection('curvas_postura').get();
    if(curvasSnap.docs.length > 0){
      curvasSnap.docs.forEach(d=>{
        // Ignora o documento "teste" que foi criado no debug
        if(d.id === 'teste') return;
        S.curvas[d.id] = d.data().curva || {};
      });
    }
    // Se ainda não tiver curvas válidas, usa as embutidas no código
    const curvasValidas = Object.keys(S.curvas).filter(k => k !== 'teste' && Object.keys(S.curvas[k]).length > 0);
    if(curvasValidas.length === 0){
      S.curvas = JSON.parse(JSON.stringify(CURVAS_BASE));
    }
    S.cg = Object.keys(S.curvas).filter(k => k !== 'teste')[0] || '';

    S.ready = true;
    render();
    buildTabs();
  } catch(e){
    S.erro = e.message;
    document.getElementById('content').innerHTML = `<div class="error-screen">❌ Erro ao conectar com Firebase:<br><strong>${e.message}</strong><br><br>Verifique se o FIREBASE_CONFIG está preenchido corretamente.</div>`;
  }
}

function buildTabs(){
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = TABS_NAMES.map((t,i)=>`<button class="tab-btn${S.tab===i?' active':''}" onclick="ST(${i})">${t}</button>`).join('');
}
async function ST(i){
  S.tab=i; S.aviario=null; S.override_prod=false; S.override_gaiola=false; S.override_soltas=false; S.override_mort=false;
  buildTabs();
  // Verifica travas ao abrir aba
  if(i===1){ S.jaLancado.gaiola=await verificar('entreposto',S.ed+'_gaiola'); S.jaLancado.soltas=await verificar('entreposto',S.ed+'_soltas'); }
  if(i===3){ S.jaLancado.mort=await verificar('mortalidade',S.md); }
  if(i===0){ S.jaLancado.prod=await verificar('produtividade',S.pd); }
  render();
}

  const map=[t0,t1,t2,t3,tPeso,t4,t5];
  document.getElementById('content').innerHTML=map[S.tab]?.()??'';
  if(activeId){const el=document.getElementById(activeId);if(el){el.focus();try{if(selStart!==undefined&&el.setSelectionRange)el.setSelectionRange(selStart,selStart);}catch(e){}}}
}

// ── PRÉ-PREENCHIMENTO AO CORRIGIR ─────────────────────────────────────────────
async function corrigirProd(){
  const doc=S.jaLancado.prod;
  if(doc?.lotes){
    Object.entries(doc.lotes).forEach(([id,v])=>{
      S.prod['f_'+id]=v.frente??'';
      S.prod['b_'+id]=v.fundo??'';
    });
  }
  S.override_prod=true; render();
}
async function corrigirGaiola(){
  const doc=S.jaLancado.gaiola;
  if(doc){
    S.gaiola.grande       = doc.grande??'';
    S.gaiola.extra        = doc.extra??'';
    S.gaiola.jumbo        = doc.jumbo??'';
    S.gaiola.sem_class    = doc.sem_classificacao??'';
    S.gaiola.ovo_liquido  = doc.ovo_liquido??'';
    S.resp = doc.responsavel||S.resp;
  }
  S.override_gaiola=true; render();
}
async function corrigirSoltas(){
  const doc=S.jaLancado.soltas;
  if(doc?.galinhas_soltas){
    Object.entries(doc.galinhas_soltas).forEach(([id,v])=>{
      S.sp['n_'+id]=v.ninho??'';
      S.sp['c_'+id]=v.chao??'';
    });
    S.resp = doc.responsavel||S.resp;
  }
  S.override_soltas=true; render();
}
async function corrigirMort(){
  const doc=S.jaLancado.mort;
  if(doc){
    if(doc.lotes) Object.entries(doc.lotes).forEach(([id,v])=>{ S.ml[id]=v??''; });
    if(doc.temperaturas) Object.entries(doc.temperaturas).forEach(([gid,v])=>{
      S.mt[gid]={max:v.max??'',min:v.min??''};
    });
    S.mo  = doc.observacoes||'';
    S.resp= doc.responsavel||S.resp;
  }
  S.override_mort=true; render();
}

// ── TAB PESO ──────────────────────────────────────────────────────────────────
function tPeso(){
  const p=S.peso;
  const lote=S.lotes.find(l=>l.id===p.loteId)||null;
  const sem=lote?semanas(lote.chegada):null;
  const isRecria=sem!==null&&sem<=18;
  const ideal=lote?getIdealPeso(lote.gen,sem,p.tipo):null;
  const isAve=p.tipo==='ave';

  // Média das medições
  const vals=p.medicoes.map(m=>parseFloat(m.val)).filter(v=>!isNaN(v)&&v>0);
  const media=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;

  // Referência ideal para o card
  let idealTxt='—', idealDesc='';
  if(ideal){
    if(isAve&&isRecria&&ideal.max!==undefined){idealTxt=`${ideal.min}g – ${ideal.max}g`;idealDesc='faixa mín–máx';}
    else if(isAve&&isRecria){idealTxt=`≥ ${ideal.min}g`;idealDesc='peso mínimo';}
    else{idealTxt=`≥ ${ideal.min}${isAve?'g':'g'}`;idealDesc=isAve?'peso mínimo':'peso mínimo ovo';}
  }

  const diffMedia=media&&ideal?classifyDev(media,ideal,isRecria&&isAve):null;

  return`
    <div class="ibox">Selecione o tipo de pesagem e o lote. Lance cada medição individualmente — a média e o diagnóstico são calculados automaticamente.</div>

      <div style="border:1.5px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;text-align:center;${isAve?'border-color:var(--verde);background:var(--verde-light)':'background:#FAFFF9'}" onclick="S.peso.tipo='ave';S.peso.medicoes=[];render()">
        ${isAve?`<div style="position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;font-size:10px;color:white">✓</div>`:''}
        <div style="font-size:20px;margin-bottom:4px">🐔</div>
        <div style="font-size:13px;font-weight:500;${isAve?'color:var(--verde)':''}">Pesagem de aves</div>
      </div>
      <div style="border:1.5px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;text-align:center;${!isAve?'border-color:#D97706;background:#FFFBEB':'background:#FAFFF9'}" onclick="S.peso.tipo='ovo';S.peso.medicoes=[];render()">
        <div style="font-size:20px;margin-bottom:4px">🥚</div>
        <div style="font-size:13px;font-weight:500;${!isAve?'color:#D97706':''}">Pesagem de ovos</div>
      </div>
    </div>

    <div class="row-2">
      <div class="form-group"><label>Responsável</label><input type="text" value="${S.resp}" placeholder="Seu nome" oninput="S.resp=this.value"></div>
      <div class="form-group"><label>Data da pesagem</label><input type="date" value="${p.data}" max="${HOJE}" oninput="S.peso.data=this.value"></div>
    </div>

    <div class="form-group"><label>Lote</label>
      <select onchange="S.peso.loteId=this.value;S.peso.medicoes=[];render()">
        <option value="">— selecione o lote —</option>
        ${la().map(l=>{const s=semanas(l.chegada);const f=s<=18?'Recria':'Produção';return`<option value="${l.id}"${p.loteId===l.id?' selected':''}>${l.nome} — ${l.gen} · ${s}sem (${f})</option>`}).join('')}
      </select>
    </div>

    ${lote?`
    <div style="border:1.5px solid var(--verde-border);border-radius:10px;padding:12px 14px;margin-bottom:14px;background:var(--verde-light);display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:14px;font-weight:500">${lote.nome}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${lote.gen} · ${sem} semanas · ${isRecria?'Recria':'Produção'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:17px;font-weight:500;color:var(--verde)">${idealTxt}</div>
        <div style="font-size:11px;color:var(--muted)">${idealDesc||'sem curva'}</div>
      </div>
    </div>

    <div class="stitle">Medições — g/${isAve?'ave':'ovo'}</div>

      <button style="padding:9px 16px;background:${isAve?'var(--verde)':'#D97706'};color:white;border:none;border-radius:var(--border);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit" onclick="addPeso()">+ Adicionar</button>

          <th style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:7px 10px;text-align:right">Peso (g)</th>

              <td style="padding:6px 10px;text-align:right"><input id="pw_${m.id}" style="width:85px;padding:4px 7px;border:1.5px solid var(--verde-border);border-radius:5px;font-size:13px;text-align:right;background:var(--verde-light);font-family:inherit" type="number" step="0.1" value="${m.val}" onchange="editPeso(${m.id},this.value)"></td>

      </div>
      <div style="background:var(--verde-light);border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Média geral</div>
        <div style="font-size:20px;font-weight:500">${media?media.toFixed(1):'—'}<span style="font-size:13px;font-weight:400">g</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">peso médio</div>
      </div>
      <div style="background:var(--verde-light);border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">vs. ideal</div>
        <div class="${diffMedia?.cls||'dev-neutro'}" style="font-size:16px">${diffMedia?.label||'—'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${idealTxt}</div>
      </div>
    </div>

    <button class="btn-sub" style="background:${isAve?'var(--verde)':'#D97706'}" onclick="subPeso()">
      Registrar pesagem — ${lote.nome} (${p.medicoes.length} medições)
    </button>`:`
    <div style="text-align:center;padding:28px 16px;color:var(--muted);font-size:13px;border:1px dashed var(--verde-border);border-radius:8px">
      Nenhuma medição ainda.<br>Digite um peso e pressione <strong>Enter</strong> ou clique em "+ Adicionar".
    </div>`}
    `:`<div class="ibox">Selecione um lote para começar o lançamento.</div>`}`;
}

function addPeso(){
  const v=parseFloat(S.peso.inputVal);
  if(isNaN(v)||v<=0){document.getElementById('inp-peso')?.focus();return;}
  S.peso.medicoes.push({id:S.peso.nextId++,val:String(v)});
  S.peso.inputVal='';
  render();
  setTimeout(()=>{const el=document.getElementById('inp-peso');if(el){el.value='';el.focus();}},10);
}
function delPeso(id){S.peso.medicoes=S.peso.medicoes.filter(m=>m.id!==id);render();}
function editPeso(id,val){const m=S.peso.medicoes.find(m=>m.id===id);if(m)m.val=val;}

async function subPeso(){
  if(!S.resp)return alert('Informe o responsável.');
  if(!S.peso.loteId)return alert('Selecione o lote.');
  if(!S.peso.medicoes.length)return alert('Adicione ao menos uma medição.');
  const p=S.peso;
  const lote=S.lotes.find(l=>l.id===p.loteId);
  const sem=semanas(lote.chegada);
  const vals=p.medicoes.map(m=>parseFloat(m.val)).filter(v=>!isNaN(v)&&v>0);
  const media=vals.reduce((a,b)=>a+b,0)/vals.length;
  const docId=`${p.data}_${p.loteId}_${p.tipo}`;
  try{
    await db.collection('peso').doc(docId).set({
      data:FS.Timestamp.fromDate(new Date(p.data+'T12:00:00')),
      tipo:p.tipo,
      lote:p.loteId,
      lote_nome:lote.nome,
      gen:lote.gen,
      semanas:sem,
      responsavel:S.resp,
      timestamp_envio:FS.FieldValue.serverTimestamp(),
      medicoes:vals,
      media:parseFloat(media.toFixed(2)),
      total_medicoes:vals.length,
    });
    toast(`✓ Pesagem registrada! Média: ${media.toFixed(1)}g`);
    S.peso={tipo:p.tipo,loteId:'',data:HOJE,medicoes:[],nextId:1,inputVal:''};
    render();
  }catch(e){toast('Erro: '+e.message,false);}
}

        <input type="date" value="${S.novoLote.chegada}" max="${HOJE}" oninput="S.novoLote.chegada=this.value;render()">

      <button class="btn-sub" style="margin-top:4px" onclick="adicionarLote()">Salvar lote no Firebase</button>

// ── TAB 5: CURVAS ─────────────────────────────────────────────────────────────

// ── HELPER: CAIXA DE TRAVA ────────────────────────────────────────────────────

  const hora=dados?.timestamp_envio?.toDate?.()?.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})||'—';
  return`<div class="trava-box">
    <div style="font-size:28px;margin-bottom:8px">🔒</div>
    <div class="trava-title">${titulo}</div>

}

// ── SUBMITS ───────────────────────────────────────────────────────────────────
async function subProd(){
  if(!S.resp)return alert('Informe o responsável.');
  if(!S.pd)return alert('Selecione a data.');
  for(const l of lp()){if((S.prod['f_'+l.id]??'')==''||(S.prod['b_'+l.id]??'')=='')return alert(`Preencha frente e fundo do ${l.nome}.`);}
  const lotes={};
  lp().forEach(l=>{lotes[l.id]={frente:parseInt(S.prod['f_'+l.id]),fundo:parseInt(S.prod['b_'+l.id])};});
  try{
    await db.collection('produtividade').doc(S.pd).set({
      data:FS.Timestamp.fromDate(new Date(S.pd+'T12:00:00')),
      responsavel:S.resp,
      timestamp_envio:FS.FieldValue.serverTimestamp(),
      lotes
    });
    toast('✓ Produtividade registrada!');
    S.prod={};S.override_prod=false;S.jaLancado.prod=await verificar('produtividade',S.pd);render();
  }catch(e){toast('Erro: '+e.message,false);}
}

async function subGaiola(){
  if(!S.resp)return alert('Informe o responsável.');
  if(!S.gaiola.grande)return alert('Informe pelo menos a produção Grande.');
  try{
    await db.collection('entreposto').doc(S.ed+'_gaiola').set({
      data:FS.Timestamp.fromDate(new Date(S.ed+'T12:00:00')),
      grande:parseInt(S.gaiola.grande)||0,
      extra:parseInt(S.gaiola.extra)||0,
      jumbo:parseInt(S.gaiola.jumbo)||0,
      sem_classificacao:parseInt(S.gaiola.sem_class)||0,
      ovo_liquido:parseFloat(S.gaiola.ovo_liquido)||0,
      responsavel:S.resp,
      timestamp_envio:FS.FieldValue.serverTimestamp(),
    });
    toast('✓ Gaiola registrada!');
    S.gaiola={grande:'',extra:'',jumbo:'',sem_class:'',ovo_liquido:''};
    S.aviario=null;S.override_gaiola=false;
    S.jaLancado.gaiola=await verificar('entreposto',S.ed+'_gaiola');render();
  }catch(e){toast('Erro: '+e.message,false);}
}

async function subSoltas(){
  if(!S.resp)return alert('Informe o responsável.');
  for(const l of ls()){if((S.sp['n_'+l.id]??'')==''||(S.sp['c_'+l.id]??'')=='')return alert(`Preencha ninho e chão do ${l.nome}.`);}
  const dados={};
  ls().forEach(l=>{const n=parseInt(S.sp['n_'+l.id])||0;const c=parseInt(S.sp['c_'+l.id])||0;dados[l.id]={ninho:n,chao:c,total:n+c};});
  try{
    await db.collection('entreposto').doc(S.ed+'_soltas').set({
      data:FS.Timestamp.fromDate(new Date(S.ed+'T12:00:00')),
      galinhas_soltas:dados,
      responsavel:S.resp,
      timestamp_envio:FS.FieldValue.serverTimestamp(),
    });
    toast('✓ Galinhas soltas registradas!');
    S.sp={};S.aviario=null;S.override_soltas=false;
    S.jaLancado.soltas=await verificar('entreposto',S.ed+'_soltas');render();
  }catch(e){toast('Erro: '+e.message,false);}
}

async function subRacao(){
  if(!S.racao.lote||!S.racao.qtd)return alert('Selecione lote e quantidade.');
  try{
    await db.collection('racao').add({
      data:FS.Timestamp.fromDate(new Date(S.racao.data+'T12:00:00')),
      lote:S.racao.lote,
      quantidade_kg:parseInt(S.racao.qtd),
      responsavel:S.resp,
      timestamp_envio:FS.FieldValue.serverTimestamp(),
    });
    toast('✓ Batida registrada!');S.racao={lote:'',qtd:'',data:HOJE};render();
  }catch(e){toast('Erro: '+e.message,false);}
}

async function subMort(){
  if(!S.resp)return alert('Informe o responsável.');
  const lotes={};la().forEach(l=>{lotes[l.id]=parseInt(S.ml[l.id])||0;});
  const temps={};GALPOES.forEach(g=>{temps[g.id]={max:parseFloat(S.mt[g.id].max)||0,min:parseFloat(S.mt[g.id].min)||0};});
  try{
    await db.collection('mortalidade').doc(S.md).set({
      data:FS.Timestamp.fromDate(new Date(S.md+'T12:00:00')),
      responsavel:S.resp,
      timestamp_envio:FS.FieldValue.serverTimestamp(),
      lotes,temperaturas:temps,observacoes:S.mo
    });
    toast('✓ Mortalidade registrada!');
    S.ml={};S.mo='';S.override_mort=false;
    S.mt={galpao_producao:{max:'',min:''},galpao_galinhas_soltas:{max:'',min:''},galpao_recria:{max:'',min:''}};
    S.jaLancado.mort=await verificar('mortalidade',S.md);render();
  }catch(e){toast('Erro: '+e.message,false);}
}

// ── GESTÃO DE LOTES ───────────────────────────────────────────────────────────
async function adicionarLote(){
  const{nome,gen,tipo,chegada}=S.novoLote;
  if(!nome||!gen||!chegada)return alert('Preencha todos os campos.');
  const id=nome.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  try{
    await db.collection('lotes').doc(id).set({nome,gen,tipo,chegada,ativo:true});
    S.lotes.push({id,nome,gen,tipo,chegada,ativo:true});
    S.lotes.sort((a,b)=>a.nome.localeCompare(b.nome));
    S.novoLote={nome:'',gen:'',tipo:'gaiola',chegada:''};S.showAdd=false;
    toast('✓ Lote adicionado!');render();
  }catch(e){toast('Erro: '+e.message,false);}
}
async function encerrarLote(id){
  if(!confirm('Encerrar este lote? Ele ficará inativo nos formulários.'))return;
  try{ await db.collection('lotes').doc(id).update({ativo:false}); S.lotes.find(l=>l.id===id).ativo=false; toast('Lote encerrado.');render(); }
  catch(e){toast('Erro: '+e.message,false);}
}
async function reativarLote(id){
  try{ await db.collection('lotes').doc(id).update({ativo:true}); S.lotes.find(l=>l.id===id).ativo=true; toast('Lote reativado.');render(); }
  catch(e){toast('Erro: '+e.message,false);}
}

// ── GESTÃO DE CURVAS ──────────────────────────────────────────────────────────
async function addGen(){
  if(!S.ng)return; if(S.curvas[S.ng])return alert('Já existe.');
  S.curvas[S.ng]={};S.cg=S.ng;S.ng='';S.showAddGen=false;toast('✓ Adicionado!');render();
}
async function addSem(gen){
  const s=parseInt(document.getElementById('nS')?.value);const p=parseFloat(document.getElementById('nP')?.value);
  if(!s||isNaN(p))return alert('Informe semana e %.');
  S.curvas[gen][s]=p;toast(`Semana ${s} adicionada.`);render();
}
function delSem(gen,s){delete S.curvas[gen][s];render();}

async function sincronizarCurvas(){
  if(!confirm('Enviar todas as curvas para o Firebase? Isso sobrescreverá os dados existentes.'))return;
  try{
    const batch=db.batch();
    // Sempre sincroniza as curvas base embutidas no código
    Object.entries(CURVAS_BASE).forEach(([gen,curva])=>{
      const ref=db.collection('curvas_postura').doc(gen);
      batch.set(ref,{curva});
    });
    // Remove o documento "teste" criado no debug se existir
    batch.delete(db.collection('curvas_postura').doc('teste'));
    await batch.commit();
    // Atualiza o estado local com as curvas base
    S.curvas = JSON.parse(JSON.stringify(CURVAS_BASE));
    S.cg = Object.keys(CURVAS_BASE)[0];
    toast('✓ 5 curvas sincronizadas com Firebase!');
    render();
  }catch(e){toast('Erro: '+e.message,false);}
}

// ── AUTENTICAÇÃO ──────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('login-bg').style.display = 'none';
    document.getElementById('root').style.display     = 'block';
    document.getElementById('user-email').textContent  = user.email;
    if(!S.ready) init();
  } else {
    document.getElementById('login-bg').style.display = 'flex';
    document.getElementById('root').style.display     = 'none';
    S.ready = false;
  }
});

async function entrar(){
  const email = document.getElementById('login-email').value.trim();
  const senha  = document.getElementById('login-senha').value;
  const erro   = document.getElementById('login-erro');
  const btn    = document.getElementById('btn-login');
  if(!email || !senha){ erro.textContent='Preencha e-mail e senha.'; erro.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  try{
    await auth.signInWithEmailAndPassword(email, senha);
    erro.style.display = 'none';
  } catch(e){
    const msgs = {
      'auth/user-not-found':'Usuário não encontrado.',
      'auth/wrong-password':'Senha incorreta.',
      'auth/invalid-email':'E-mail inválido.',
      'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.',
    };
    erro.textContent = msgs[e.code] || 'Erro ao entrar. Tente novamente.';
    erro.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function sair(){
  if(confirm('Deseja sair?')) auth.signOut();
}
</script>
